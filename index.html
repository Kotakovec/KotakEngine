<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KotakEngine AI</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
    }
    .topbar {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: #111;
    }
    .brand {
      display: flex;
      align-items: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: white;
      margin-right: 15px;
      gap: 10px;
    }
    .brand img {
      height: 40px;
      user-select: none;
    }
    input {
      flex-grow: 1;
      padding: 0.8rem;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
    }
    .chatbox {
      white-space: pre-wrap;
      background: #222;
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="logo.png" alt="Logo" />
      KotakEngine
    </div>
    <input type="text" id="search" placeholder="Zeptej se na cokoliv..." />
  </div>

  <div id="result"></div>

  <script>
    const input = document.getElementById("search");
    const result = document.getElementById("result");

    // ⚠️ Vlož svůj OpenRouter klíč sem (jen pro testy – NIKDY veřejně!)
    const API_KEY = "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";

    input.addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const prompt = input.value.trim();
        if (!prompt) return;

        result.innerHTML = "<p style='margin:1rem;'>Načítám odpověď z AI...</p>";

        try {
          const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${API_KEY}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              model: "mistral/mistral-7b-instruct",
              messages: [
                { role: "system", content: "Odpovídej jako chytrý český vyhledávač, přidávej odkazy, pokud jsou relevantní." },
                { role: "user", content: prompt }
              ]
            })
          });

          const data = await res.json();
          const answer = data.choices?.[0]?.message?.content || "⚠️ Odpověď se nepodařilo načíst.";
          result.innerHTML = `<div class="chatbox">${answer}</div>`;
        } catch (err) {
          console.error(err);
          result.innerHTML = "<div class='chatbox'>⚠️ Chyba při volání API</div>";
        }
      }
    });
  </script>
</body>
</html>
